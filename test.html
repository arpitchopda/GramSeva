<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login/Register</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: url("farmers-bg.jpg") no-repeat center center/cover;

        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background-color: rgba(255, 255, 255, 0.85);
        padding: 30px 40px;
        border-radius: 10px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        width: 300px;
      }

      h2 {
        text-align: center;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-bottom: 10px;
      }

      button:hover {
        background: #45a049;
      }

      .toggle-link {
        text-align: center;
        font-size: 14px;
      }

      .toggle-link span {
        color: #007bff;
        cursor: pointer;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Login Form -->
      <form id="loginForm">
        <h2>Login</h2>
        <input type="text" id="loginUsername" placeholder="Username" required />
        <input
          type="password"
          id="loginPassword"
          placeholder="Password"
          required
        />
        <button type="submit">Login</button>
        <div class="toggle-link">
          Don't have an account? <span onclick="toggleForm()">Register</span>
        </div>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="hidden">
        <h2>Register</h2>
        <input type="text" id="name" placeholder="Full Name" required />
        <input type="text" id="username" placeholder="Username" required />
        <input type="email" id="email" placeholder="Email" required />
        <input type="tel" id="phone" placeholder="Phone Number" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Register</button>
        <div class="toggle-link">
          Already have an account? <span onclick="toggleForm()">Login</span>
        </div>
      </form>
    </div>

    <script>
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");

      function toggleForm() {
        loginForm.classList.toggle("hidden");
        registerForm.classList.toggle("hidden");
      }

      loginForm.addEventListener("submit", function (e) {
        e.preventDefault();
        const username = document.getElementById("loginUsername").value;
        const password = document.getElementById("loginPassword").value;
        const users = JSON.parse(localStorage.getItem("users")) || [];

        const validUser = users.find(
          (u) => u.username === username && u.password === password
        );

        if (validUser) {
          alert("Login successful!");
          window.location.href = "index.html"; // Replace with your dashboard/home
        } else {
          alert("Invalid username or password!");
        }
      });

      registerForm.addEventListener("submit", function (e) {
        e.preventDefault();
        const name = document.getElementById("name").value;
        const username = document.getElementById("username").value;
        const email = document.getElementById("email").value;
        const phone = document.getElementById("phone").value;
        const password = document.getElementById("password").value;

        let users = JSON.parse(localStorage.getItem("users")) || [];
        const userExists = users.some((u) => u.username === username);

        if (userExists) {
          alert("Username already exists!");
        } else {
          users.push({ name, username, email, phone, password });
          localStorage.setItem("users", JSON.stringify(users));
          alert("Registration successful!");
          toggleForm();
        }
      });
      localStorage.setItem("currentUser", JSON.stringify(validUser));
    </script>
  </body>
</html>
