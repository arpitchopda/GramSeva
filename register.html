<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        height: 100vh;
        background: url("https://i.ibb.co/PGYrXFgL/farmers-bg.jpg") no-repeat
          center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .form-container {
        background: rgba(0, 0, 0, 0.5);
        padding: 30px;
        border-radius: 10px;
        color: white;
        width: 350px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
        text-align: center;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: none;
        border-radius: 4px;
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background-color: #45a049;
      }

      .login-link {
        margin-top: 10px;
        display: block;
        color: #ddd;
        font-size: 14px;
        text-decoration: none;
      }

      .login-link:hover {
        text-decoration: underline;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <form class="form-container" id="registerForm">
      <h2>Register</h2>
      <input type="text" id="name" placeholder="Full Name" required />
      <input type="text" id="username" placeholder="Username" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="tel" id="phone" placeholder="Phone Number" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Register</button>
      <a href="login.html" class="login-link">Already have an account? Login</a>
    </form>

    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const name = document.getElementById("name").value;
          const username = document.getElementById("username").value;
          const email = document.getElementById("email").value;
          const phone = document.getElementById("phone").value;
          const password = document.getElementById("password").value;

          const user = { name, username, email, phone, password };
          let users = JSON.parse(localStorage.getItem("users")) || [];

          const userExists = users.some((u) => u.username === username);
          if (userExists) {
            alert("Username already exists!");
          } else {
            users.push(user);
            localStorage.setItem("users", JSON.stringify(users));
            alert("Registration successful!");
            window.location.href = "login.html";
          }
        });
    </script>
  </body>
</html>
